    <style>
      .whatsapp-float {
        position: fixed;
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 20px;
        background-color: #25d366;
        color: #fff;
        border-radius: 50%;
        text-align: center;
        font-size: 30px;
        box-shadow: 2px 2px 5px #999;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s ease;
      }
      .whatsapp-float:hover {
        transform: scale(1.1);
      }
      .whatsapp-icon {
        width: 35px;
        height: 35px;
      }
    </style>
  </head>

  <body>
   
    <div id="root"></div>

    <!-- ✅ WhatsApp Floating Button -->

      href="https://wa.me/919510614306"
      class="whatsapp-float"
      target="_blank"
      aria-label="Chat with us on WhatsApp"
    >
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
        alt="WhatsApp"
        class="whatsapp-icon"
      />
    </a>

    <script type="module" src="/src/main.tsx"></script>
  </body>
